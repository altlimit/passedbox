runtime: go125
app_engine_apis: true

instance_class: F1
automatic_scaling:
  max_instances: 10
  min_instances: 0

handlers:
  - url: /task/.*
    secure: always
    script: auto
    login: admin

  - url: /.*
    secure: always
    redirect_http_response_code: 301
    script: auto

env_variables:
  HTTP_TASK: "true"